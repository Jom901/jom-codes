<style>
  :root{
    --bg: #0a0a0a;
    --bg-2: #121212;
    --ink: #f1f1ef;
    --ink-2: #b8b8b3;
    --ink-3: #74746e;
    --ink-4: #3a3a36;
    --line: #1f1f1d;
    --line-2: #2e2e2b;
    --accent: #ff7a2f;
    --sans: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --pad-y: 80px;
    --grid-line: rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: -1px -1px;
    min-height:100vh;
  }
  ::selection{background:var(--accent);color:#0a0a0a}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit}

  .wrap{max-width:1280px;margin:0 auto;padding:0 24px}
  @media(max-width:640px){ .wrap{padding:0 16px} }

  /* status bar */
  .status{
    position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line-2);
    font-family:var(--mono);font-size:11.5px;letter-spacing:0.04em;
  }
  .status-row{
    display:grid;grid-template-columns: auto 1fr auto auto auto;gap:0;align-items:stretch;
  }
  .status-cell{padding:10px 16px;border-right:1px solid var(--line-2);display:flex;align-items:center;gap:8px;color:var(--ink-2)}
  .status-cell:last-child{border-right:0}
  .status-cell .k{color:var(--ink-3);text-transform:uppercase;font-size:10.5px;letter-spacing:0.1em}
  .status-cell .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .status-cell.shrink{min-width:0}
  .status-cell a:hover{color:var(--accent)}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
  .live-clock{color:var(--accent)}

  @media(max-width:980px){
    .status-cell.hide-md{display:none}
  }
  @media(max-width:720px){
    .status-row{grid-template-columns: auto 1fr auto}
    .status-cell.hide-mobile{display:none}
  }

  /* hero */
  .hero{padding: calc(var(--pad-y) * 1.4) 0 var(--pad-y);position:relative;overflow:hidden}

  .hero-bar{
    display:grid;grid-template-columns: repeat(12, 1fr);gap:24px;
    border-top:2px solid var(--ink);border-bottom:1px solid var(--line-2);
    padding:14px 0 16px;font-family:var(--mono);font-size:11.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-3);
  }
  .hero-bar .col{grid-column:span 3}
  .hero-bar .col b{color:var(--ink);font-weight:500;display:block;margin-top:4px;text-transform:none;font-size:13.5px;letter-spacing:0}
  @media(max-width:880px){
    .hero-bar{grid-template-columns:repeat(2,1fr);gap:18px}
    .hero-bar .col{grid-column:span 1}
  }

  .mark{
    font-family:var(--sans);font-weight:700;font-size:clamp(72px, 17vw, 240px);
    line-height:0.86;letter-spacing:-0.05em;color:var(--ink);margin:36px 0 0;text-transform:uppercase;
  }
  .mark .l1{display:block}
  .mark .l2{display:block;color:var(--accent);font-style:italic;font-weight:700}
  .mark .l3{display:block;color:var(--ink);}
  .mark .punch{
    display:inline-block;background:var(--accent);color:var(--bg);padding:0 0.12em;line-height:0.9;border-radius:0;
  }
  .mark .strike{text-decoration: line-through;text-decoration-thickness:0.06em;color:var(--ink-3)}

  .hero-deck{
    margin-top:40px;display:grid;grid-template-columns: 1.4fr 1fr;gap:48px;align-items:start;
    border-top:1px solid var(--line-2);padding-top:32px;
  }
  @media(max-width:880px){ .hero-deck{grid-template-columns:1fr;gap:28px} }
  .hero-deck p{
    margin:0;font-family:var(--sans);font-size:clamp(17px, 1.5vw, 21px);line-height:1.5;color:var(--ink-2);max-width:50ch;
  }
  .hero-deck p em{color:var(--accent);font-style:normal;background:var(--accent);color:var(--bg);padding:0 4px}

  .hero-cta{display:flex;gap:0;border:1px solid var(--ink)}
  .hero-cta .btn{
    flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 18px;
    font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;
    cursor:pointer;border:0;border-right:1px solid var(--ink);background:transparent;color:var(--ink);transition:all .15s;
  }
  .hero-cta .btn:last-child{border-right:0}
  .hero-cta .btn:hover{background:var(--accent);color:var(--bg)}
  .hero-cta .btn.primary{background:var(--accent);color:var(--bg)}
  .hero-cta .btn.primary:hover{background:var(--ink);color:var(--bg)}

  /* stats strip */
  .strip{
    border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2);
    display:grid;grid-template-columns: repeat(4, 1fr);gap:0;
    margin: var(--pad-y) 0 0;
  }
  .strip .cell{
    padding:36px 24px;border-right:1px solid var(--line-2);position:relative;
    display:flex;flex-direction:column;gap:6px;cursor:default;transition:background .2s;
  }
  .strip .cell:last-child{border-right:0}
  .strip .cell:hover{background:rgba(255,122,47,0.06)}
  .strip .cell .n{
    font-family:var(--sans);font-weight:700;font-size:clamp(40px, 5vw, 64px);
    line-height:1;letter-spacing:-0.02em;color:var(--ink);font-variant-numeric:tabular-nums;
  }
  .strip .cell:hover .n{color:var(--accent)}
  .strip .cell .lbl{

  .strip .cell .sub{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:0.02em}

    .strip .cell:nth-child(2){border-right:0}

  .sec-head{
    border-top:2px solid var(--ink);padding-top:18px;margin-bottom:40px;
    display:grid;grid-template-columns: auto 1fr auto;gap:24px;align-items:baseline;
  }
  .sec-head .id{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:0.08em;text-transform:uppercase}
  .sec-head h2{
    font-family:var(--sans);font-weight:700;font-size:clamp(36px,5vw,64px);letter-spacing:-0.03em;line-height:0.95;
    margin:0;text-transform:uppercase;
  }
  .sec-head .meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:0.04em}
  @media(max-width:640px){
    .sec-head{grid-template-columns:1fr;gap:12px}
    .sec-head .meta{order:3}
  }

  /* work */
  .roles{display:flex;flex-direction:column;gap:0;border-bottom:1px solid var(--line-2)}
  .role{
    display:grid;grid-template-columns: 96px 220px 1fr;gap:24px;
    border-top:1px solid var(--line-2);padding:28px 0;
    transition: background .2s ease, padding .2s ease;
    cursor:default;align-items:start;
  }
  .role:hover{background:rgba(255,255,255,0.015);padding-left:8px;padding-right:8px}
  .role:hover .role-co{color:var(--accent)}
  .role .role-no{
    font-family:var(--mono);font-size:11.5px;color:var(--ink-4);letter-spacing:0.06em;padding-top:6px;
  }
  .role .role-when{padding-top:4px;font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:0.02em}
  .role .role-when b{display:block;color:var(--ink-2);font-weight:500;margin-bottom:6px}
  .role .role-when .loc{display:block;color:var(--ink-4);margin-top:4px}
  .role .role-when .now-tag{
    display:inline-block;margin-top:10px;padding:2px 7px;background:var(--accent);color:var(--bg);
    font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  }
  .role .role-body h3{
    font-family:var(--sans);font-weight:600;font-size:24px;letter-spacing:-0.01em;line-height:1.1;margin:0 0 2px;color:var(--ink);
  }
  .role .role-co{
    font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink-2);margin-bottom:14px;letter-spacing:0.01em;
    transition: color .2s ease;
  }
  .role .role-body ul{margin:0;padding-left:18px;color:var(--ink-2);font-size:15px;line-height:1.55}
  .role .role-body ul li{margin-bottom:6px}
  .role .role-body ul li::marker{color:var(--accent)}
  .role .stack{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .role .stack .s{
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;
    padding:3px 8px;border:1px solid var(--line-2);color:var(--ink-3);
  }
  .role:hover .stack .s{border-color:var(--ink-4);color:var(--ink-2)}

  @media(max-width:880px){
    .role{grid-template-columns: 1fr;gap:8px}
    .role .role-no{display:none}

  /* skills */
  .skg{
    display:grid;grid-template-columns:repeat(12,1fr);gap:0;border-top:1px solid var(--line-2);

  .skg .skc{

  .skg .skc h4{
    font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:0.12em;text-transform:uppercase;

  .skg .skc ul li::before{content:"+";color:var(--ink-4);font-family:var(--mono);font-size:12px}

    .skg .skc:nth-child(2n){border-right:0}

  .cpanel{

  .cpanel-top{
    padding:48px 36px;border-bottom:1px solid var(--line-2);

  }
  @media(max-width:880px){ .cpanel-top{grid-template-columns:1fr;gap:24px;padding:32px 24px} }
  .cpanel-top h3{

  .cpanel-top h3 .a{color:var(--accent)}
  .cpanel-top p{margin:0;font-family:var(--sans);color:var(--ink-2);font-size:16px;line-height:1.5}
  .cpanel-rows{display:grid;grid-template-columns:1fr 1fr;gap:0}
  @media(max-width:720px){ .cpanel-rows{grid-template-columns:1fr} }
  .cp-row{
    display:flex;align-items:center;justify-content:space-between;padding:22px 36px;
    border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);
    transition: background .15s ease;cursor:default;
  }
  button.cp-row{appearance:none;border:0;background:transparent;width:100%;text-align:inherit;font:inherit;color:inherit;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);cursor:pointer}
  .cp-row .cp-val .copied-tag{
    display:inline-block;margin-left:10px;padding:2px 7px;background:var(--accent);color:var(--bg);
    font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;vertical-align:1px;
    animation: copiedIn .2s ease;
  }
  @keyframes copiedIn{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:none}}
  .cp-row:last-child{border-right:0}
  .cp-row:nth-child(2n){border-right:0}
  .cp-row:nth-last-child(-n+2){border-bottom:0}
  @media(max-width:720px){
    .cp-row{padding:18px 24px;border-right:0}
    .cp-row:nth-last-child(-n+2){border-bottom:1px solid var(--line-2)}
    .cp-row:last-child{border-bottom:0}
  }
  .cp-row:hover{background:rgba(255,122,47,0.06)}
  .cp-row:hover .cp-val{color:var(--accent)}
  .cp-lbl{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:0.14em;text-transform:uppercase}
  .cp-val{font-family:var(--mono);font-size:13px;color:var(--ink);transition: color .15s ease;text-align:right;word-break:break-all}

  /* marquee */
  .marquee{
    margin:var(--pad-y) 0 0;border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2);
    overflow:hidden;padding:18px 0;
  }
  .marquee-inner{
    display:flex;gap:48px;white-space:nowrap;animation: scroll 38s linear infinite;
    font-family:var(--sans);font-weight:700;font-size:36px;letter-spacing:-0.02em;text-transform:uppercase;
  }
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .marquee-inner .b{color:var(--accent)}
  .marquee-inner .sep{color:var(--ink-4)}

  /* footer */
  footer{
    padding:36px 0;border-top:1px solid var(--line-2);margin-top:var(--pad-y);
    font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:0.04em;
  }
  .foot-grid{
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;
  }
  .foot-grid b{color:var(--ink-2);font-weight:500}
  .foot-grid .pets{
    display:inline-flex;gap:6px;align-items:center;
  }
  .foot-grid .pets span{padding:1px 6px;border:1px solid var(--line-2);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase}

  /* reveal */
  .reveal{opacity:0;transform:translateY(16px);transition: opacity .55s ease, transform .55s ease}
  .reveal.in{opacity:1;transform:none}
</style>

function useReveal(ref){
  React.useEffect(() => {
    if(!ref.current) return;
    const io = new IntersectionObserver((ents) => {
      ents.forEach(e => { if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
}

function useClock(){
  const [t, setT] = React.useState(() => new Date());
  React.useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return t;
}

function Contact(){
  const ref = React.useRef(null); useReveal(ref);
  const [copied, setCopied] = React.useState(false);
  function copyEmail(e){
    e.preventDefault();
    const text = CONTACT.email;
    const flash = () => { setCopied(true); setTimeout(() => setCopied(false), 1800); };
    let done = false;
    try{
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly","");
      ta.style.position = "fixed"; ta.style.left = "-9999px"; ta.style.top = "0";
      document.body.appendChild(ta);
      ta.select(); ta.setSelectionRange(0, text.length);
      done = document.execCommand("copy");
      document.body.removeChild(ta);
    }catch(_){ done = false; }
    if(done){ flash(); return; }
    if(navigator.clipboard?.writeText){
      navigator.clipboard.writeText(text).then(flash).catch(() => flash());
    } else {
      flash();
    }
  }
  return (
    <section data-sec="contact" id="contact">
      <div className="wrap reveal" ref={ref}>
        <div className="sec-head">
          <span className="id">§ 03</span>
          <h2>Contact</h2>
          <span className="meta">response: usually &lt; 24h</span>
        </div>
        <div className="cpanel">
          <div className="cpanel-top">
            <h3>Let's <span className="a">make</span> something / talk shop / swap notes on guitars.</h3>
            <p>Roles, collaborations, or coffee — all welcome.</p>
          </div>
          <div className="cpanel-rows">
            <button className="cp-row" onClick={copyEmail} type="button" aria-label="Copy email to clipboard">
              <span className="cp-lbl">{copied ? "✓ copied" : "⎘ copy email"}</span>
              <span className="cp-val">{CONTACT.email}{copied && <span className="copied-tag">copied</span>}</span>
            </button>
            <a className="cp-row" href={CONTACT.linkedinUrl} target="_blank" rel="noreferrer">
              <span className="cp-lbl">→ linkedin</span><span className="cp-val">{CONTACT.linkedinHandle}</span>
            </a>
            <a className="cp-row" href={CONTACT.githubUrl} target="_blank" rel="noreferrer">
              <span className="cp-lbl">→ github</span><span className="cp-val">{CONTACT.github}</span>
            </a>
            <a className="cp-row" href={CONTACT.resume} target="_blank" rel="noreferrer">
              <span className="cp-lbl">→ résumé</span><span className="cp-val">drive.google · view ↗</span>
            </a>
          </div>
        </div>
      </div>
    </section>
  );
}
